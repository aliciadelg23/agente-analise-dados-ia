services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agente-analise-dados-ia:latest
    container_name: agente-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      STORAGE_DIR: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  dashboard:
    image: agente-analise-dados-ia:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agente-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command:
      - streamlit
      - run
      - dashboard/Home.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
      - --browser.gatherUsageStats
      - "false"
