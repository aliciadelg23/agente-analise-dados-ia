# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: link the repository to Render and select "New Blueprint".
services:
  - type: web
    name: agente-analise-dados-ia-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 8000
      - key: STORAGE_DIR
        value: /app/storage
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: storage
      mountPath: /app/storage
      sizeGB: 1
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
