# Fly.io configuration — https://fly.io/docs/reference/configuration/
# Bootstrap with `fly launch --no-deploy` then `fly volumes create data --size 1`.
app = "agente-analise-dados-ia"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = 15

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  STORAGE_DIR = "/app/storage"
  LOG_LEVEL = "INFO"

[[mounts]]
  source = "data"
  destination = "/app/storage"

[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

[[services]]
  processes = ["api"]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    grace_period = "20s"
    method = "GET"
    path = "/health"
    protocol = "http"
    restart_limit = 3
    timeout = "5s"
