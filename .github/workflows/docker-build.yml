name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "app/**"
      - "dashboard/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "app/**"
      - "dashboard/**"
      - ".github/workflows/docker-build.yml"

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: agente-analise-dados-ia:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (import app.main)
        run: |
          docker run --rm agente-analise-dados-ia:ci \
            python -c "import app.main; print('OK', app.main.app.title)"
